name: Employer Feed Watch

on:
  workflow_dispatch: {}
  schedule:
    # 9:17 AM America/New_York during EDT (UTC-4). During EST (roughly
    # Nov-Mar) this fires around 8:17 AM local — GitHub Actions cron is
    # always UTC and does not shift for daylight saving time. See
    # docs/operations/employer-feed-monitoring.md for the accepted tradeoff.
    - cron: "17 13 * * 1"
  pull_request:
    paths:
      - "monitoring/**"
      - "scripts/check-employer-feeds.mjs"
      - ".github/workflows/employer-feed-watch.yml"
      - "docs/operations/employer-feed-monitoring.md"

permissions:
  contents: read
  issues: write

jobs:
  check-employer-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Run employer feed checker
        env:
          # Only true for scheduled/manual runs on main. Pull-request runs
          # never create or update the monitoring issue, even if this file
          # itself is the change under review.
          UPDATE_ISSUE: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-employer-feeds.mjs
