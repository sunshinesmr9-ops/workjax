name: Monthly ATS Discovery

on:
  workflow_dispatch:

  schedule:
    # Runs every Tuesday at 13:23 UTC.
    # The workflow checks the date and proceeds only on the first Tuesday
    # of the month.
    - cron: "23 13 * * 2"

  pull_request:
    paths:
      - "monitoring/ats-research-candidates.json"
      - "scripts/check-ats-sources.mjs"
      - ".github/workflows/monthly-ats-discovery.yml"
      - "docs/operations/monthly-ats-discovery.md"

permissions:
  contents: read
  issues: write

jobs:
  check-ats-sources:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Determine whether this run should proceed
        id: schedule-gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          day_of_month="$(date -u +%d)"

          if (( 10#$day_of_month <= 7 )); then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run monthly ATS discovery
        if: steps.schedule-gate.outputs.should_run == 'true'
        env:
          # Pull-request runs print the report only.
          # Manual and scheduled runs on main may maintain the GitHub issue.
          UPDATE_ISSUE: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-ats-sources.mjs

      - name: Skip non-first-Tuesday scheduled run
        if: github.event_name == 'schedule' && steps.schedule-gate.outputs.should_run != 'true'
        run: echo "This is not the first Tuesday of the month. No ATS discovery scan was run."
